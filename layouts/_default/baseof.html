<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Site.Title }} | {{ .Title }}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- AOS Scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    
    <!-- ===== NETLIFY IDENTITY WIDGET CSS ===== -->
    <link rel="stylesheet" href="https://identity.netlify.com/v1/netlify-identity-widget.css" />
    
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 40px -10px rgba(0,0,0,0.15);
            --accent: #0ea5e9;
            --accent-dark: #0284c7;
            --gradient: linear-gradient(135deg, #0ea5e9, #6366f1);
            --nav-bg: rgba(255,255,255,0.8);
            --resume-color: #10b981;
            --radius: 20px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            --shadow-hover: 0 20px 40px -10px rgba(0,0,0,0.7);
            --nav-bg: rgba(15,23,42,0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            line-height: 1.7;
        }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }
        section { padding: 80px 0; }
        img { max-width: 100%; height: auto; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: var(--gradient);
            color: #fff;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(14, 165, 233, 0.5); }
        
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid var(--border-color);
            transition: 0.3s;
            display: inline-block;
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            padding: 16px 0;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            transition: 0.3s;
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { font-weight: 400; -webkit-text-fill-color: var(--text-muted); }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
            list-style: none;
        }
        .nav-links a {
            font-weight: 500;
            color: var(--text-secondary);
            transition: 0.3s;
            position: relative;
        }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: 0.3s;
        }
        .nav-links a:hover::after { width: 100%; }

        #theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        #theme-toggle:hover { background: var(--accent); color: #fff; }
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-primary);
            background: none;
            border: none;
        }

        /* ===== HERO WITH BACKGROUND IMAGE ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
            background-image: url('/images/property-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Dark Overlay for text readability */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .hero .container {
            position: relative;
            z-index: 1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            color: #ffffff;
        }

        .hero-content h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content .tagline {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin: 20px 0 30px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hero Image (Profile Photo) - Styled for dark background */
        .hero-image {
            border-radius: 30px;
            height: 450px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 30px;
            transition: transform 0.5s;
        }

        .hero-image:hover img {
            transform: scale(1.03);
        }

        .hero-image .fallback-icon {
            position: absolute;
            font-size: 6rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 0;
        }

        /* Hero Buttons - White/Dark Background Compatible */
        .hero .btn-primary {
            background: var(--gradient);
            color: #fff;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }

        .hero .btn-outline {
            background: transparent;
            color: #ffffff;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            display: inline-block;
        }

        .hero .btn-outline:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Stats - Styled for dark background */
        .hero .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .hero .stat-item .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
        }

        .hero .stat-item .label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* ===== PROPERTY CARDS ===== */
        .property-filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .filter-btn {
            padding: 10px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--gradient);
            color: #fff;
            border-color: transparent;
        }
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }
        .property-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: 0.3s;
        }
        .property-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }
        .property-thumb {
            height: 220px;
            overflow: hidden;
            position: relative;
            background: var(--bg-secondary);
        }
        .property-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .property-card:hover .property-thumb img { transform: scale(1.05); }
        .property-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .property-status.sale { background: #10b981; }
        .property-status.rent { background: #f59e0b; }
        .property-info { padding: 25px; }
        .property-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .property-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 8px 0;
        }
        .property-location {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .property-details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .property-details i { margin-right: 5px; color: var(--accent); }
        .property-card .btn-outline {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 0.9rem;
            width: 100%;
            text-align: center;
        }

        /* ===== MAP ===== */
        #property-map {
            height: 350px;
            border-radius: var(--radius);
            margin: 30px 0;
            z-index: 1;
        }

        /* ===== CONTACT ===== */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--bg-card);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            margin-bottom: 15px;
            font-family: inherit;
            transition: 0.3s;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
        }
        .contact-form textarea { height: 130px; resize: vertical; }
        .contact-form button { width: 100%; }

        /* ===== FOOTER ===== */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 30px 0;
            text-align: center;
            color: var(--text-muted);
        }
        .social-links a {
            display: inline-block;
            margin: 0 10px;
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: 0.3s;
        }
        .social-links a:hover { color: var(--accent); transform: translateY(-3px); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; }
            .hero-content h1 { font-size: 2.8rem; }
            .contact-wrapper { grid-template-columns: 1fr; }
            .hero-image { height: 350px; max-width: 400px; margin: 0 auto; }
            .hero .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: var(--bg-primary);
                padding: 30px;
                border-bottom: 1px solid var(--border-color);
                box-shadow: var(--shadow);
            }
            .nav-links.open { display: flex; }
            .hamburger { display: block; }
            .hero-content h1 { font-size: 2.2rem; }
            .properties-grid { grid-template-columns: 1fr; }
            .hero-image { height: 280px; max-width: 300px; }
            .contact-wrapper { padding: 25px; }
            .hero .stats-grid { grid-template-columns: 1fr 1fr; padding: 20px; }
            .hero .stat-item .number { font-size: 1.8rem; }
            .hero {
                background-attachment: scroll; /* Fixed parallax off for mobile */
            }
        }
    </style>
</head>
<body>

{{ partial "header.html" . }}

<main>
    {{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

<!-- ===== SCRIPTS ===== -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    AOS.init({ duration: 800, once: true });

    // Dark Mode
    const toggleBtn = document.getElementById('theme-toggle');
    const html = document.documentElement;
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            toggleBtn.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
    }

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    if (hamburger) {
        hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => navLinks.classList.remove('open'));
        });
    }

    // Property Filter (on list page)
    const filterBtns = document.querySelectorAll('.filter-btn');
    const propertyCards = document.querySelectorAll('.property-card');
    if (filterBtns.length > 0) {
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const filter = this.getAttribute('data-filter');
                propertyCards.forEach(card => {
                    if (filter === 'all' || card.getAttribute('data-status') === filter) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    }
</script>

<!-- ===== NETLIFY IDENTITY WIDGET (For Admin Invite) ===== -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
    // Initialize Netlify Identity Widget
    if (window.netlifyIdentity) {
        window.netlifyIdentity.init();
        
        // Handle invite token
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
    }
</script>

</body>
</html>
